<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadłospis - Formularz</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="theme-switch-wrapper">
        <button id="theme-toggle" onclick="toggleTheme()">🌙 Tryb Ciemny</button>
    </div>

    <h1>JADŁOSPIS</h1>

    <div class="container">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Posiłek</th>
                        <th>Pon</th>
                        <th>Wt</th>
                        <th>Śr</th>
                        <th>Czw</th>
                        <th>Pt</th>
                        <th>Sob</th>
                        <th>Nd</th>
                    </tr>
                </thead>
                <tbody id="mealTable">
                    <tr data-category="śniadanie">
                        <td class="row-title">Śniadanie</td>
                        <td id="sn-1"></td>
                        <td id="sn-2"></td>
                        <td id="sn-3"></td>
                        <td id="sn-4"></td>
                        <td id="sn-5"></td>
                        <td id="sn-6"></td>
                        <td id="sn-7"></td>
                    </tr>
                    <tr data-category="obiad">
                        <td class="row-title">Obiad</td>
                        <td id="ob-1" colspan="2"></td>
                        <td id="ob-3" colspan="2"></td>
                        <td id="ob-5"></td>
                        <td id="ob-6" colspan="2"></td>
                    </tr>
                    <tr data-category="kolacja">
                        <td class="row-title">Kolacja</td>
                        <td id="ko-1" colspan="2"></td>
                        <td id="ko-3" colspan="2"></td>
                        <td id="ko-5"></td>
                        <td id="ko-6" colspan="2"></td>
                    </tr>
                    <tr data-category="przekąska">
                        <td class="row-title">Przekąska</td>
                        <td id="pr-1"></td>
                        <td id="pr-2"></td>
                        <td id="pr-3"></td>
                        <td id="pr-4"></td>
                        <td id="pr-5"></td>
                        <td id="pr-6"></td>
                        <td id="pr-7"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="table-after"></div>

        <div class="actions">
            <button id="printJadlospisBtn" onclick="printJadlospis()">DRUKUJ JADŁOSPIS</button>
            <button id="generateListBtn">STWÓRZ LISTĘ ZAKUPÓW</button>
            <button id="openFormBtn">DODAJ POSIŁEK DO BAZY</button>
            <button id="exportDbBtn" onclick="exportDatabase()">EKSPORTUJ BAZĘ
                (.JSON)</button>
            <button id="importDbBtn" onclick="triggerImport()">IMPORTUJ BAZĘ</button>
            <input type="file" id="importInput" style="display: none;" accept=".json" onchange="importDatabase(event)">
        </div>

        <div class="main-wrapper">
            <div id="shoppingListSection" class="planner-section" style="display:none;">
                <div class="planner-section-title">
                    <h2>LISTA ZAKUPÓW</h2>
                    <button class="refresh-list-btn" id="refreshListBtn" title="Aktualizuj listę">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                    <button class="close-list-btn" onclick="closeShoppingList()">&times;</button>
                </div>
                <div id="shoppingListContainer">
                </div>
                <div class="print-actions">
                    <button onclick="printLista()" class="printLista">DRUKUJ LISTĘ ZAKUPÓW</button>
                    <button onclick="downloadLista()" class="downloadLista">POBIERZ LISTĘ (.TXT)</button>
                    <button onclick="shareToKeep()" class="btn-share">Wyślij do Google Keep / Udostępnij</button>
                </div>
            </div>

            <div class="database-section">
                <h2>TWOJA BAZA POSIŁKÓW</h2>
                <div id="mealsDatabase" class="meals-grid">
                    <details id="db-śniadanie" class="category-accordion">
                        <summary>Śniadania</summary>
                        <div class="category-wrapper">
                            <div class="category-content"></div>
                        </div>
                    </details>

                    <details id="db-obiad" class="category-accordion">
                        <summary>Obiady</summary>
                        <div class="category-wrapper">
                            <div class="category-content"></div>
                        </div>
                    </details>

                    <details id="db-kolacja" class="category-accordion">
                        <summary>Kolacje</summary>
                        <div class="category-wrapper">
                            <div class="category-content"></div>
                        </div>
                    </details>

                    <details id="db-przekąska" class="category-accordion">
                        <summary>Przekąski</summary>
                        <div class="category-wrapper">
                            <div class="category-content"></div>
                        </div>
                    </details>
                </div>
            </div>

        </div>

        <div id="mealPickerModal" class="overlay" style="display:none;">
            <div class="modal">
                <h2>Wybierz posiłek z bazy</h2>

                <input type="text" id="modalSearchInput" placeholder="Szukaj dania...">

                <div id="modalMealsList">
                </div>

                <div class="modal-buttons">
                    <button type="button" onclick="closeMealPicker()" class="btn-secondary">Zamknij</button>
                </div>
            </div>
        </div>

        <div id="modalOverlay" class="overlay">
            <div class="modal">
                <h2>Dodaj posiłek do bazy</h2>
                <form id="mealForm">
                    <label>Kategoria:</label>
                    <select id="modal-category-select">
                        <option value="śniadanie">Śniadanie</option>
                        <option value="obiad">Obiad</option>
                        <option value="kolacja">Kolacja</option>
                        <option value="przekąska">Przekąska</option>
                    </select>

                    <label>Nazwa posiłku:</label>
                    <input type="text" id="mealNameInput" placeholder="np. Shakshuka" required>

                    <label>Składniki:</label>
                    <textarea id="ingredientsInput" rows="2" placeholder="Składniki..." required></textarea>

                    <div class="modal-buttons">
                        <button type="button" id="cancelBtn" class="btn-secondary">Anuluj</button>
                        <button type="submit" class="btn-primary">Zapisz w bazie</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="meal-modal" class="overlay">
            <div class="modal">
                <h3>Dodaj posiłek do planu</h3>

                <form id="mealForm">
                    <label for="modal-day-select">Wybierz dzień:</label>
                    <select id="modal-day-select">
                        <option value="1">Poniedziałek</option>
                        <option value="2">Wtorek</option>
                        <option value="3">Środa</option>
                        <option value="4">Czwartek</option>
                        <option value="5">Piątek</option>
                        <option value="6">Sobota</option>
                        <option value="7">Niedziela</option>
                    </select>

                    <label for="modal-category-select">Wybierz posiłek:</label>
                    <select id="modal-category-select">
                        <option value="śniadanie">Śniadanie</option>
                        <option value="obiad">Obiad</option>
                        <option value="kolacja">Kolacja</option>
                        <option value="przekąska">Przekąska</option>
                    </select>

                    <div class="modal-actions">
                        <button type="button" onclick="closeModalBnt()" class="btn-secondary">Anuluj</button>
                        <button type="button" onclick="handleModalSave(event)" class="btn-primary">Zapisz</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="infoModal" class="overlay" style="display:none;">
            <div class="modal">
                <h2 id="infoModalTitle">Składniki posiłku</h2>
                <div id="infoModalContent"
                    style="margin: 20px 0; line-height: 1.6; max-height: 300px; overflow-y: auto;">
                </div>
                <div class="modal-buttons">
                    <button type="button" onclick="closeInfoModal()" class="btn-primary">Rozumiem</button>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
</body>

</html>
